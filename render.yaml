services:
  - type: web
    name: table-tennis-backend
    env: node
    plan: free
    buildCommand: cd backend && npm install
    startCommand: cd backend && npm start
    envVars:
      - key: PORT
        value: 5000
      - key: JWT_SECRET
        value: supersecret_tabletennis_key_2026
      - key: MONGO_URI
        sync: false # Requires inputting MongoDB Atlas connection string in Render dashboard
      - key: NODE_ENV
        value: production
